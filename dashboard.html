<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
  <h2>Dashboard</h2>

  <div class="row mt-4">
    <div class="col-md-4">
      <div class="card p-3 shadow"><h5>Users</h5><p>120</p></div>
    </div>
    <div class="col-md-4">
      <div class="card p-3 shadow"><h5>Projects</h5><p>15</p></div>
    </div>
    <div class="col-md-4">
      <div class="card p-3 shadow"><h5>Revenue</h5><p>$5000</p></div>
    </div>
  </div>
</div>

</body>
</html>
